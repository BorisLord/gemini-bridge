name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
        with:
          experimental: true
      - name: Install server deps
        working-directory: server
        run: uv pip install --system -r requirements.txt
      - name: Lint
        run: mise run lint
      - name: Run unit tests
        working-directory: server
        timeout-minutes: 5
        run: python -m unittest discover tests -v
